{% include calculate_relative_base.html %}
{% include escape-404.html %}

<header class="site-header">
  <div class="shell shell-wide site-header-inner">
    <a class="site-brand" href="{{ relativebase }}">{{ site.title }}</a>
    <button class="site-menu-toggle" type="button" aria-expanded="false" aria-controls="site-menu">
      <span>Menu</span>
    </button>
    <nav class="site-nav" id="site-menu">
      <a href="{{ relativebase }}archive.html" class="{% if page.url contains 'archive' or page.url contains 'tag' or page.url contains 'tags' %}active-nav{% endif %}">Posts</a>
      <a href="{{ relativebase }}about.html" class="{% if page.url contains 'about' %}active-nav{% endif %}">About</a>
      <a class="nav-icon-link {% if page.url contains 'search' %}active-icon{% endif %}" href="{{ relativebase }}search.html" aria-label="Search">
        <i class="fa fa-search" aria-hidden="true"></i>
      </a>
      <button class="theme-toggle-button" id="theme-toggle" type="button" aria-label="테마 변경">
        <span class="theme-toggle-icon theme-toggle-icon-sun"><i class="fa fa-sun-o" aria-hidden="true"></i></span>
        <span class="theme-toggle-icon theme-toggle-icon-moon"><i class="fa fa-moon-o" aria-hidden="true"></i></span>
      </button>
    </nav>
  </div>
</header>
