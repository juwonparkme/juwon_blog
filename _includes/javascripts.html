{% include escape-404.html %}

<script>
(function() {
  var root = document.documentElement;
  var toggle = document.getElementById('theme-toggle');
  var menuToggle = document.querySelector('.site-menu-toggle');
  var menu = document.getElementById('site-menu');
  var storedTheme = localStorage.getItem('theme');

  if (!root.dataset.theme) {
    root.dataset.theme = storedTheme === 'light' ? 'light' : 'dark';
  }

  if (toggle) {
    toggle.addEventListener('click', function() {
      var nextTheme = root.dataset.theme === 'dark' ? 'light' : 'dark';
      root.dataset.theme = nextTheme;
      localStorage.setItem('theme', nextTheme);
    });
  }

  if (menuToggle && menu) {
    menuToggle.addEventListener('click', function() {
      var expanded = menuToggle.getAttribute('aria-expanded') === 'true';
      menuToggle.setAttribute('aria-expanded', expanded ? 'false' : 'true');
      menu.classList.toggle('is-open');
    });
  }

  var tagSections = document.querySelectorAll('[data-tag-section]');
  if (tagSections.length) {
    var selectedTag = new URLSearchParams(window.location.search).get('tag');
    var emptyState = document.getElementById('tag-empty-state');
    var matched = false;

    tagSections.forEach(function(section) {
      if (selectedTag && section.dataset.tagSection === selectedTag) {
        section.classList.remove('hidden');
        matched = true;
      } else {
        section.classList.add('hidden');
      }
    });

    if (emptyState) {
      emptyState.classList.toggle('hidden', matched);
    }
  }

  var pageSearchInput = document.getElementById('search-input');
  if (pageSearchInput && document.body.dataset.pageType === 'search') {
    var params = new URLSearchParams(window.location.search);
    var initialQuery = params.get('q');

    if (initialQuery) {
      pageSearchInput.value = initialQuery;
      pageSearchInput.dispatchEvent(new Event('input', { bubbles: true }));
    }

    setTimeout(function() {
      pageSearchInput.focus();
    }, 50);

    pageSearchInput.addEventListener('input', function() {
      var nextParams = new URLSearchParams(window.location.search);
      if (pageSearchInput.value.trim()) {
        nextParams.set('q', pageSearchInput.value.trim());
      } else {
        nextParams.delete('q');
      }
      var nextQuery = nextParams.toString();
      var nextUrl = window.location.pathname + (nextQuery ? '?' + nextQuery : '');
      window.history.replaceState({}, '', nextUrl);
    });
  }
})();
</script>

<script src="{{ relativebase }}assets/js/jekyll-search.js"></script>

{% if page.mathjax %}
  <script type="text/x-mathjax-config">
    MathJax.Hub.Config({
      extensions: ["tex2jax.js"],
      tex2jax: {
        inlineMath: [ ['$','$'], ["\\(","\\)"] ],
        displayMath: [ ['$$','$$'], ["\\[","\\]"] ],
        processEscapes: true
      },
      "CommonHTML": { linebreaks: { automatic: true } }
    });
  </script>
  <script src="//mathjax.rstudio.com/latest/MathJax.js?config=TeX-MML-AM_CHTML"></script>
{% endif %}

<script>
  var searchInput = document.getElementById('search-input');
  var resultsContainer = document.getElementById('results-container');
  if (searchInput && resultsContainer && window.SimpleJekyllSearch) {
    SimpleJekyllSearch({
      searchInput: searchInput,
      resultsContainer: resultsContainer,
      json: '{{ relativebase }}search.json',
      searchResultTemplate: '<li><a href="{url}" title="{description}">{title}</a><p>{description}</p></li>',
      noResultsText: 'No results found',
      fuzzy: false,
      exclude: ['Welcome']
    });
  }
</script>
