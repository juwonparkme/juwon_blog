{% include calculate_relative_base.html %}
{% include escape-404.html %}

<head>
  <meta charset="utf-8">
  <title>{% if page.title %}{{page.title}} - {{site.title}}{% else %}{{site.title}}{% endif %}</title>
  <link rel="canonical" href="{{ site.url }}{{ page.url }}">
  <meta name="description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  {% include SEO.html %}
  <meta name="theme-color" content="#1e2436">
  <meta name="msapplication-navbutton-color" content="#1e2436">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;700&family=IBM+Plex+Sans+KR:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ relativebase }}assets/fonts/font-awesome/css/font-awesome.min.css">
  <link rel="stylesheet" href="{{ relativebase }}assets/css/main.css">
  {% include favicon.html %}
  {% if page.layout == 'post' %}
  <link rel="stylesheet" href="{{ relativebase }}assets/css/highlighter/{{ site.highlight_theme }}.css">
  {% endif %}
  <script>
    (function() {
      var storedTheme = localStorage.getItem("theme");
      document.documentElement.dataset.theme = storedTheme === "light" ? "light" : "dark";
    })();
  </script>
</head>
